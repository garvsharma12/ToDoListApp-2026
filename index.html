<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Modern Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>
    <div class="blur-blob blob-1"></div>
    <div class="blur-blob blob-2"></div>
    <div class="blur-blob blob-3"></div>

    <!-- Navigation -->
    <nav class="navbar navbar-dark sticky-top mb-0" style="backdrop-filter: blur(10px); background: rgba(13, 110, 253, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h4 fw-bold">
                <i class="bi bi-rocket-takeoff"></i> TaskFlow
            </span>
            <div class="text-light small">
                <span id="dateTime"></span>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-900" style="max-width: 900px;">
                
                <!-- Header Section -->
                <div class="mb-5 text-center text-white">
                    <h1 class="display-5 fw-bold mb-2">TaskFlow</h1>
                    <p class="lead opacity-75">Stay organized, stay productive</p>
                </div>

                <!-- Stats Cards -->
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="stat-card glass-card">
                            <div class="stat-icon bg-primary">
                                <i class="bi bi-list-check"></i>
                            </div>
                            <div class="stat-content">
                                <p class="stat-label">Total Tasks</p>
                                <h3 class="stat-value" id="totalTasks">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card glass-card">
                            <div class="stat-icon bg-success">
                                <i class="bi bi-check-circle-fill"></i>
                            </div>
                            <div class="stat-content">
                                <p class="stat-label">Completed</p>
                                <h3 class="stat-value" id="completedTasks">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card glass-card">
                            <div class="stat-icon bg-warning">
                                <i class="bi bi-hourglass-split"></i>
                            </div>
                            <div class="stat-content">
                                <p class="stat-label">Pending</p>
                                <h3 class="stat-value" id="pendingTasks">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Add Task Section -->
                <div class="glass-card mb-4 p-4 shadow-lg">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text glass-input-addon">
                            <i class="bi bi-pencil-square"></i>
                        </span>
                        <input type="text" id="taskInput" class="form-control glass-input" 
                               placeholder="What needs to be done today?" aria-label="New task">
                        <button class="btn btn-primary btn-add-task" id="addBtn" type="button">
                            <i class="bi bi-plus-lg"></i> Add Task
                        </button>
                    </div>
                </div>

                <!-- Filter Tabs -->
                <div class="filter-tabs mb-4">
                    <input type="radio" class="btn-check" name="filter" id="filterAll" value="all" checked>
                    <label class="filter-btn" for="filterAll">
                        <i class="bi bi-funnel"></i> All Tasks
                    </label>

                    <input type="radio" class="btn-check" name="filter" id="filterActive" value="active">
                    <label class="filter-btn" for="filterActive">
                        <i class="bi bi-lightning-fill"></i> Active
                    </label>

                    <input type="radio" class="btn-check" name="filter" id="filterCompleted" value="completed">
                    <label class="filter-btn" for="filterCompleted">
                        <i class="bi bi-check-lg"></i> Completed
                    </label>
                </div>

                <!-- Tasks List -->
                <div id="tasksList" class="tasks-container">
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="bi bi-inbox"></i>
                        </div>
                        <p class="empty-text">No tasks yet</p>
                        <p class="empty-subtext">Add a task to get started</p>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="row g-2 mt-4">
                    <div class="col-md-6">
                        <button class="btn btn-danger w-100 btn-action" id="clearCompleted">
                            <i class="bi bi-trash3"></i> Clear Completed
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-info w-100 btn-action" id="exportTasks">
                            <i class="bi bi-download"></i> Export Tasks
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
